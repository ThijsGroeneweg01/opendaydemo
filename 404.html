<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Redirect to index.html with the original path preserved
      var pathSegments = window.location.pathname.split('/').filter(Boolean);
      var repoName = pathSegments[0];
      var originalPath = '/' + pathSegments.slice(1).join('/');
      
      // Store the redirect path in sessionStorage for index.html to use
      sessionStorage.redirect = originalPath;
      
      // Redirect to index.html
      window.location.href = '/' + repoName + '/';
    </script>
  </head>
  <body>
  </body>
</html>
